name: Feature request
description: Suggest a safe improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Requests for undocumented write registers need protocol evidence and safety notes.
  - type: textarea
    id: feature
    attributes:
      label: Feature
      description: What should be added or improved?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why is this useful?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Protocol evidence or references
      description: Required for new registers or control behavior.
