name: Bug report
description: Report a reproducible integration problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        This is an unofficial community integration. Do not send reports to SAJ.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact IP addresses, serial numbers, and tokens.
      render: text
